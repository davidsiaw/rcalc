name: yard
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true
    - name: setup
      run: |-
        bundle install -j 4
    - uses: webfactory/ssh-agent@v0.9.0
      with:
          ssh-private-key: ${{ secrets.DEPLOYKEY }}
    - name: push master
      run: |-
        git config --global user.name "davidsiaw(ghactions)"
        git config --global user.email "874280+davidsiaw@users.noreply.github.com"
        git config --global gpg.format ssh
        git config --global commit.gpgsign true
        echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBal8KgOmBlmAs64pNyont8ZSqf1HfpHeDgL9PDgHlre david@ghactions" > signingkey
        chmod 600 signingkey
        git config --global user.signingkey $PWD/signingkey
        sh deploy.sh
'on':
  push:
    branches:
    - master
